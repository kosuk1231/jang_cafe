<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장카페 주문서 · 종로종합사회복지관</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-deco top"></div>
    <div class="header-inner">
      <p class="header-sub">종로종합사회복지관</p>
      <h1 class="header-title">장 카 페</h1>
      <p class="header-tagline">어르신과 함께하는 따뜻한 찻자리</p>
    </div>
    <div class="header-deco bottom"></div>
  </header>

  <main class="container">

    <!-- STEP 1: NAME -->
    <section class="step-card">
      <div class="step-badge">주문자</div>
      <h2 class="step-title">성함을 적어주세요</h2>
      <div class="name-input-wrap">
        <input type="text" id="customerName" class="name-input"
          placeholder="홍길동" maxlength="10" autocomplete="off" />
      </div>
    </section>

    <!-- STEP 2: HOT / ICED -->
    <section class="step-card">
      <div class="step-badge">온도 선택</div>
      <h2 class="step-title">HOT · ICED</h2>
      <div class="temp-toggle-wrap">
        <button class="temp-btn active" data-temp="HOT">🔥 HOT</button>
        <button class="temp-btn" data-temp="ICED">🧊 ICED</button>
      </div>
    </section>

    <!-- STEP 3: MENU -->
    <section class="step-card">
      <div class="step-badge">메뉴 선택</div>
      <h2 class="step-title">원하시는 메뉴를 골라주세요</h2>
      <p class="step-hint">여러 개 선택 가능 · 선택한 온도에 맞는 메뉴만 표시됩니다</p>
      <div class="menu-grid" id="menuGrid"></div>
    </section>

    <!-- STEP 4: SUMMARY -->
    <section class="step-card summary-card">
      <div class="step-badge">주문 확인</div>
      <h2 class="step-title">주문 내역</h2>

      <div class="summary-row">
        <span class="summary-label">주문자</span>
        <span class="summary-value" id="summaryName">—</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">온도</span>
        <span class="summary-value" id="summaryTemp">HOT</span>
      </div>

      <div class="summary-items" id="summaryItems">
        <p class="empty-msg">메뉴를 선택해주세요</p>
      </div>

      <div class="summary-total-row">
        <span class="summary-label">합계</span>
        <span class="summary-total" id="summaryTotal">0원</span>
      </div>

      <button class="submit-btn" id="submitBtn" disabled>
        <span class="btn-text">주문하기</span>
        <span class="btn-arrow">→</span>
      </button>
    </section>

  </main>

  <!-- RECEIPT MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="receipt-header">
        <p class="receipt-store">장 카 페</p>
        <p class="receipt-sub">종로종합사회복지관</p>
        <div class="receipt-divider solid"></div>
      </div>
      <div class="receipt-body">
        <div class="receipt-row"><span>주문자</span><strong id="rcptName">—</strong></div>
        <div class="receipt-row"><span>온도</span><strong id="rcptTemp">—</strong></div>
        <div class="receipt-divider dashed"></div>
        <div id="rcptItems"></div>
        <div class="receipt-divider dashed"></div>
        <div class="receipt-row total-row">
          <span>합계</span><strong id="rcptTotal">0원</strong>
        </div>
      </div>
      <div class="receipt-footer">
        <p id="rcptStatus">잠시만 기다려 주세요...</p>
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="closeModal" style="width: 100%;">닫기</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <footer class="site-footer">
    <p>장카페 · 종로종합사회복지관 <a href="admin.html" class="admin-link">🔒</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
